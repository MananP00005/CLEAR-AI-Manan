server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Phone camera photos can be several MB -- default 1m is too small.
    client_max_body_size 20m;

    # Groq calls are normally a couple seconds, but give the proxy generous
    # timeouts instead of nginx's default 60s in case of provider slowness.
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
